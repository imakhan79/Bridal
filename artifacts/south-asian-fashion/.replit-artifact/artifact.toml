kind = "web"
previewPath = "/"
title = "South Asian Fashion Store"
version = "1.0.0"
id = "artifacts/south-asian-fashion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25894

[services.development]
run = "pnpm --filter @workspace/south-asian-fashion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/south-asian-fashion", "run", "build" ]
publicDir = "artifacts/south-asian-fashion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25894"
BASE_PATH = "/"
